<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 516 386" fill="none">
  <!-- Pastel fairy wands & heart shield -->
  <defs>
    <linearGradient id="wand-l" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="wand-r" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7dd3c7"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Left wand -->
  <g filter="url(#soft)">
    <rect x="152" y="80" width="16" height="260" rx="8" fill="url(#wand-l)" transform="rotate(-15, 160, 210)"/>
    <!-- Star tip -->
    <g transform="translate(140, 58) rotate(-15, 20, 20)">
      <path d="M20 0 L24 14 L38 14 L27 23 L31 38 L20 29 L9 38 L13 23 L2 14 L16 14 Z" fill="#f9a8d4"/>
      <path d="M20 6 L23 15 L32 15 L25 21 L27 30 L20 25 L13 30 L15 21 L8 15 L17 15 Z" fill="#fff0f6" opacity="0.7"/>
    </g>
    <!-- Sparkles -->
    <circle cx="120" cy="100" r="3" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="108" cy="130" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="130" cy="70" r="2.5" fill="#fda4af" opacity="0.5"/>
  </g>
  <!-- Right wand -->
  <g filter="url(#soft)">
    <rect x="348" y="80" width="16" height="260" rx="8" fill="url(#wand-r)" transform="rotate(15, 356, 210)"/>
    <!-- Star tip -->
    <g transform="translate(348, 58) rotate(15, 20, 20)">
      <path d="M20 0 L24 14 L38 14 L27 23 L31 38 L20 29 L9 38 L13 23 L2 14 L16 14 Z" fill="#c084fc"/>
      <path d="M20 6 L23 15 L32 15 L25 21 L27 30 L20 25 L13 30 L15 21 L8 15 L17 15 Z" fill="#f3e8ff" opacity="0.7"/>
    </g>
    <!-- Sparkles -->
    <circle cx="396" cy="100" r="3" fill="#c084fc" opacity="0.6"/>
    <circle cx="408" cy="130" r="2" fill="#7dd3c7" opacity="0.5"/>
    <circle cx="386" cy="70" r="2.5" fill="#fda4af" opacity="0.5"/>
  </g>
  <!-- Center heart shield -->
  <g filter="url(#soft)">
    <path d="M258 280 C258 280 180 220 180 170 C180 140 200 120 230 120 C248 120 258 135 258 135 C258 135 268 120 286 120 C316 120 336 140 336 170 C336 220 258 280 258 280 Z" fill="#492331" stroke="#f9a8d4" stroke-width="3"/>
    <path d="M258 265 C258 265 195 215 195 175 C195 150 210 135 233 135 C248 135 258 148 258 148 C258 148 268 135 283 135 C306 135 321 150 321 175 C321 215 258 265 258 265 Z" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
    <!-- Inner sparkle -->
    <g transform="translate(245, 170)">
      <path d="M13 0 L15.5 9.5 L26 10 L18 16.5 L20 26 L13 20 L6 26 L8 16.5 L0 10 L10.5 9.5 Z" fill="#f9a8d4" opacity="0.8"/>
    </g>
  </g>
</svg>
