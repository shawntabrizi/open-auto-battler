<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 516 386" fill="none">
  <!-- Cyberpunk energy blades -->
  <defs>
    <linearGradient id="blade-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f6ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="blade-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Left blade -->
  <g filter="url(#glow)">
    <path d="M130 320 L220 60 L260 60 L190 320 Z" fill="url(#blade-l)" opacity="0.9"/>
    <path d="M220 60 L240 40 L260 60 Z" fill="#00f6ff"/>
    <!-- Crossguard -->
    <rect x="120" y="300" width="80" height="12" rx="3" fill="#00d8ff" opacity="0.8"/>
    <!-- Handle -->
    <rect x="148" y="312" width="24" height="40" rx="4" fill="#0b2436"/>
    <rect x="148" y="312" width="24" height="40" rx="4" fill="url(#blade-l)" opacity="0.3"/>
    <!-- Pommel -->
    <circle cx="160" cy="358" r="10" fill="#00f6ff" opacity="0.7"/>
  </g>
  <!-- Right blade -->
  <g filter="url(#glow)">
    <path d="M386 320 L296 60 L256 60 L326 320 Z" fill="url(#blade-r)" opacity="0.9"/>
    <path d="M296 60 L276 40 L256 60 Z" fill="#d946ef"/>
    <!-- Crossguard -->
    <rect x="316" y="300" width="80" height="12" rx="3" fill="#d946ef" opacity="0.8"/>
    <!-- Handle -->
    <rect x="344" y="312" width="24" height="40" rx="4" fill="#0b2436"/>
    <rect x="344" y="312" width="24" height="40" rx="4" fill="url(#blade-r)" opacity="0.3"/>
    <!-- Pommel -->
    <circle cx="356" cy="358" r="10" fill="#d946ef" opacity="0.7"/>
  </g>
  <!-- Center shield/hexagon -->
  <g filter="url(#glow)">
    <polygon points="258,120 308,155 308,225 258,260 208,225 208,155" fill="#07101f" stroke="#00f6ff" stroke-width="3" opacity="0.9"/>
    <polygon points="258,140 296,167 296,213 258,240 220,213 220,167" fill="none" stroke="#d946ef" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner energy symbol -->
    <circle cx="258" cy="190" r="18" fill="none" stroke="#00f6ff" stroke-width="2" opacity="0.8"/>
    <path d="M258 172 L248 195 L260 188 L258 208 L268 185 L256 192 Z" fill="#00f6ff" opacity="0.9"/>
  </g>
</svg>
