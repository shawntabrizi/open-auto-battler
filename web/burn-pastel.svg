<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250" fill="none">
  <!-- Pastel fairy dust / dissolve icon -->
  <defs>
    <linearGradient id="burn-p1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="burn-p2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#7dd3c7"/>
    </linearGradient>
    <filter id="pastel-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#pastel-glow)">
    <!-- Soft flame / petal shape -->
    <path d="M125 195 C105 170 80 145 88 115 C96 85 112 65 125 45 C138 65 154 85 162 115 C170 145 145 170 125 195Z" fill="url(#burn-p1)" opacity="0.6"/>
    <path d="M125 180 C112 162 95 140 100 118 C105 96 116 80 125 62 C134 80 145 96 150 118 C155 140 138 162 125 180Z" fill="#f9a8d4" opacity="0.5"/>
    <path d="M125 165 C116 152 106 138 110 122 C114 106 120 95 125 80 C130 95 136 106 140 122 C144 138 134 152 125 165Z" fill="#fda4af" opacity="0.6"/>
    <!-- Core glow -->
    <circle cx="125" cy="125" r="15" fill="#fff0f6" opacity="0.6"/>
    <circle cx="125" cy="125" r="8" fill="white" opacity="0.5"/>
    <!-- Floating sparkles / fairy dust -->
    <g opacity="0.7">
      <!-- Star sparkles -->
      <g transform="translate(90, 80)">
        <path d="M6 0 L7.5 4.5 L12 5 L8.5 8 L9.5 12.5 L6 10 L2.5 12.5 L3.5 8 L0 5 L4.5 4.5Z" fill="#c084fc" opacity="0.8"/>
      </g>
      <g transform="translate(148, 72)">
        <path d="M5 0 L6.2 3.8 L10 4.2 L7.2 6.7 L8 10.5 L5 8.4 L2 10.5 L2.8 6.7 L0 4.2 L3.8 3.8Z" fill="#f9a8d4" opacity="0.7"/>
      </g>
      <g transform="translate(72, 130)">
        <path d="M4 0 L5 3 L8 3.3 L5.8 5.3 L6.3 8.3 L4 6.7 L1.7 8.3 L2.2 5.3 L0 3.3 L3 3Z" fill="#7dd3c7" opacity="0.6"/>
      </g>
      <g transform="translate(165, 120)">
        <path d="M4 0 L5 3 L8 3.3 L5.8 5.3 L6.3 8.3 L4 6.7 L1.7 8.3 L2.2 5.3 L0 3.3 L3 3Z" fill="#fda4af" opacity="0.6"/>
      </g>
      <!-- Small dots -->
      <circle cx="80" cy="60" r="3" fill="#c084fc" opacity="0.4"/>
      <circle cx="170" cy="65" r="2.5" fill="#f9a8d4" opacity="0.4"/>
      <circle cx="65" cy="155" r="2" fill="#7dd3c7" opacity="0.3"/>
      <circle cx="185" cy="150" r="2.5" fill="#fda4af" opacity="0.3"/>
      <circle cx="105" cy="50" r="2" fill="#f9a8d4" opacity="0.3"/>
      <circle cx="145" cy="55" r="1.5" fill="#c084fc" opacity="0.3"/>
    </g>
  </g>
</svg>
