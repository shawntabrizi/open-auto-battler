<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250" fill="none">
  <!-- Cyberpunk energy dissolve/recycle icon -->
  <defs>
    <linearGradient id="burn-c1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00f6ff"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#ff4d9d"/>
    </linearGradient>
    <linearGradient id="burn-c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8ff66"/>
      <stop offset="100%" stop-color="#00f6ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <g filter="url(#neon)">
    <circle cx="125" cy="125" r="85" fill="none" stroke="url(#burn-c1)" stroke-width="4" opacity="0.8"/>
    <!-- Inner dissolving particles going up -->
    <g opacity="0.9">
      <!-- Flame-like energy rising -->
      <path d="M125 190 C110 170 95 150 100 125 C105 100 115 85 125 65 C135 85 145 100 150 125 C155 150 140 170 125 190Z" fill="url(#burn-c1)" opacity="0.7"/>
      <path d="M125 180 C115 165 105 148 110 130 C115 112 120 100 125 82 C130 100 135 112 140 130 C145 148 135 165 125 180Z" fill="#00f6ff" opacity="0.5"/>
      <!-- Core -->
      <circle cx="125" cy="130" r="12" fill="#f8ff66" opacity="0.8"/>
      <circle cx="125" cy="130" r="6" fill="white" opacity="0.6"/>
    </g>
    <!-- Arrow fragments (recycle/convert feel) -->
    <path d="M68 160 L55 140 L75 140 Z" fill="#d946ef" opacity="0.7"/>
    <path d="M182 160 L195 140 L175 140 Z" fill="#00f6ff" opacity="0.7"/>
    <path d="M125 55 L115 40 L135 40 Z" fill="#f8ff66" opacity="0.7"/>
  </g>
  <!-- Orbiting dots -->
  <circle cx="60" cy="100" r="4" fill="#00f6ff" opacity="0.5"/>
  <circle cx="190" cy="100" r="4" fill="#d946ef" opacity="0.5"/>
  <circle cx="125" cy="220" r="4" fill="#ff4d9d" opacity="0.5"/>
</svg>
