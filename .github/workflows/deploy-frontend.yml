name: Deploy Frontend

on:
  push:
    branches:
      - production
      - master
  pull_request:
    branches:
      - production
      - master
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Skip deployment cache and force redeploy'
        type: boolean
        default: false

permissions:
  contents: read
  statuses: write
  id-token: write
  pull-requests: write

concurrency:
  group: deploy-frontend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check for changes
    outputs:
      source-hash: ${{ steps.source-hash.outputs.hash }}
      cache-hit: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute source hash
        id: source-hash
        run: echo "hash=$(git ls-files web/ .github/workflows/deploy-frontend.yml | xargs sha256sum | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Check deployment cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: .deployment-marker
          key: deployment-${{ steps.source-hash.outputs.hash }}
          lookup-only: true

  build:
    needs: check
    if: needs.check.outputs.cache-hit != 'true' || inputs.skip-cache
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM Core
        run: ./build-wasm.sh

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: web/dist
          key: build-${{ needs.check.outputs.source-hash }}

      - name: Build app
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm run build
        working-directory: web
        env:
          VITE_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist
          retention-days: 1

  deploy:
    needs: [check, build]
    if: needs.check.outputs.cache-hit != 'true' || inputs.skip-cache
    name: Deploy
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: ${{ github.ref == 'refs/heads/production' && 'oab' || 'dev-oab' }}
      mode: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      subname-format: pr-number
      artifact-name: frontend-build
      register-base: true
      skip-cache: ${{ inputs.skip-cache || false }}
      max-retries: 3
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC || 'bottom drive obey lake curtain smoke basket hold race lonely fit walk' }}

  post-deploy:
    needs: [check, deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    name: Mark as deployed
    steps:
      - name: Create deployment marker
        run: echo "deployed" > .deployment-marker

      - name: Cache deployment marker
        uses: actions/cache/save@v4
        with:
          path: .deployment-marker
          key: deployment-${{ needs.check.outputs.source-hash }}
